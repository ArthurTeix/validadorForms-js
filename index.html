<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <title>Modelo</title>
</head>

<body>

  <section class="container">
    <h1>Formulário de cadastro</h1>

    <ul>
      <li>Nenhum campo pode estar vazio</li>
      <li>Nome de usuário só pode conter letras e/ou números</li>
      <li>Nome de usuário deverá ter entre 3 a 12 caracteres</li>
      <li>Senha deverá ter entre 6 a 12 caracteres</li>
    </ul>

    <form action="/" method="POST" class="form-main">
      <label>Nome</label>
      <input type="text" class="name validate">
    
      <label>Sobrenome</label>
      <input type="text" class="last-name validate">
      
      <label>CPF</label>
      <input type="text" class="cpf validate">
      
      <label>Usuário</label>
      <input type="text" class="user validate">
      
      <label>Senha</label>
      <input type="password" class="password validate">
      
      <label>Repetir Senha</label>
      <input type="password" class="repeat-password validate">

      <button type="submit">Enviar</button>
    </form>
  </section>

  <script src="assets/js/validatorCpf.js"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
